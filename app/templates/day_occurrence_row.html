<li class="flex items-center gap-3 py-2 border-b border-base-200 last:border-0">
  <input type="checkbox" class="checkbox checkbox-sm"
        {% if occ.completed %}checked{% endif %}
        hx-put="/calendar/{{ day.date }}/todos/{{ occ.id }}/toggle"
        hx-target="closest li" hx-swap="outerHTML">
  <span class="{% if occ.completed %}line-through opacity-50{% endif %}">{{ occ.title }}</span>
</li>
