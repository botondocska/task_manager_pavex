{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <form hx-post="/signup" hx-target="#form-result" hx-swap="innerHTML"
        class="bg-base-100 border border-base-300 p-6 sm:p-8 rounded-lg shadow-md w-full max-w-96 space-y-4">
    <h1 class="text-2xl font-bold">Sign Up</h1>
    <div id="form-result" class="text-sm"></div>
    <input name="username" type="text" placeholder="Username"
           class="input input-bordered input-lg sm:input-md w-full">
    <input name="email" type="email" placeholder="Email"
           class="input input-bordered input-lg sm:input-md w-full">
    <input name="password" type="password" placeholder="Password"
           class="input input-bordered input-lg sm:input-md w-full">
    <button type="submit" class="btn btn-primary btn-lg sm:btn-md w-full">
      Create Account
    </button>
  </form>
</div>
{% endblock %}
