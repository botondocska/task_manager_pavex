{% extends "nav.html" %}
{% block title %}Labels{% endblock %}
{% block page_content %}
  <h1 class="mb-6 text-2xl font-bold">Labels</h1>

  <form hx-post="/labels" hx-target="#label-list" hx-swap="beforeend"
        class="mb-6 flex flex-col sm:flex-row gap-2">
    <input name="name" type="text" placeholder="Name" required
           class="input input-bordered input-lg sm:input-md flex-1">
    <input name="color" type="color" value="#3b82f6"
           class="h-12 w-12 sm:h-10 sm:w-10 rounded-full border border-base-300 bg-base-100 p-0 self-start sm:self-auto">
    <button type="submit" class="btn btn-primary btn-lg sm:btn-md">
      Add
    </button>
  </form>

  <ul id="label-list" class="space-y-2">
    {% for label in labels %}
      {% include "label_row.html" %}
    {% endfor %}
  </ul>
{% endblock %}
