{% extends "base.html" %}
{% block title %}Labels{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 py-6 sm:py-10">
  {% include "page_nav.html" %}

  <h1 class="mb-6 text-2xl font-bold text-gray-800">Labels</h1>

  <form hx-post="/labels" hx-target="#label-list" hx-swap="beforeend"
        class="mb-6 flex gap-2">
    <input name="name" type="text" placeholder="Name" required
           class="flex-1 border border-gray-300 rounded px-3 py-2">
    <input name="color" type="color" value="#3b82f6"
          class="h-10 w-10 rounded-full border border-gray-300 bg-white p-0">
    <button type="submit"
            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
      Add
    </button>
  </form>

  <ul id="label-list" class="space-y-2">
    {% for label in labels %}
      {% include "label_row.html" %}
    {% endfor %}
  </ul>
</div>
{% endblock %}
