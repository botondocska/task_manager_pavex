<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}App{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script>
    document.addEventListener('htmx:responseError', function (evt) {
        const dialog = document.getElementById('error-dialog');
        const msg = document.getElementById('error-dialog-message');
        msg.innerHTML = evt.detail.xhr.responseText;
        dialog.showModal();
    });
    </script>
    <style>
    input[type="color"] {
        appearance: none;
        -webkit-appearance: none;
        padding: 0;
        overflow: hidden;
        border-radius: 9999px;
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
    }

    input[type="color"]::-webkit-color-swatch {
        border: none;
        border-radius: 9999px;
    }

    input[type="color"]::-moz-color-swatch {
        border: none;
        border-radius: 9999px;
    }
    </style>
</head>
<body class="bg-gray-50">
    {% block content %}{% endblock %}
    <dialog id="error-dialog" class="rounded-lg shadow-xl p-0 max-w-sm w-full backdrop:bg-black/40">
    <div class="p-6">
        <p id="error-dialog-message" class="text-red-700 text-sm"></p>
        <button onclick="document.getElementById('error-dialog').close()"
                class="mt-4 w-full bg-gray-200 py-2 rounded hover:bg-gray-300">
        Close
        </button>
    </div>
    </dialog>
</body>
</html>
