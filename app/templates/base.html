<!DOCTYPE html>
<html lang="en" data-theme="forest">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}App{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script>
    document.addEventListener('htmx:responseError', function (evt) {
        const dialog = document.getElementById('error-dialog');
        const msg = document.getElementById('error-dialog-message');
        msg.innerHTML = evt.detail.xhr.responseText;
        dialog.showModal();
    });
    </script>
    <style>
    input[type="color"] {
        appearance: none;
        -webkit-appearance: none;
        padding: 0;
        overflow: hidden;
        border-radius: 9999px;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 9999px; }
    input[type="color"]::-moz-color-swatch { border: none; border-radius: 9999px; }
    </style>
</head>
<body class="bg-base-200 min-h-screen text-base-content">
    {% block content %}{% endblock %}

    <label class="swap swap-rotate fixed bottom-4 right-4 btn btn-circle btn-ghost">
        <input type="checkbox" class="theme-controller" value="nord"
               onchange="document.documentElement.setAttribute('data-theme', this.checked ? 'nord' : 'forest')">
        <!-- sun icon -->
        <svg class="swap-off h-6 w-6 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Z"/>
        </svg>
        <!-- moon icon -->
        <svg class="swap-on h-6 w-6 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Z"/>
        </svg>
    </label>

    <dialog id="error-dialog" class="modal">
    <div class="modal-box">
        <p id="error-dialog-message" class="text-error text-sm"></p>
        <div class="modal-action">
            <button onclick="document.getElementById('error-dialog').close()"
                    class="btn btn-block">
            Close
            </button>
        </div>
    </div>
    </dialog>
</body>
</html>
