{% extends "base.html" %}
{% block title %}Todos{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 py-6 sm:py-10">
  {% include "page_nav.html" %}

  <div class="mb-6 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-800">Todos</h1>
    <button onclick="document.getElementById('add-todo-dialog').showModal()"
            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
      Add Todo
    </button>
  </div>

  <dialog id="add-todo-dialog" class="rounded-lg shadow-xl p-0 max-w-md w-full backdrop:bg-black/40">
    <div class="p-6 bg-white">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-gray-800">New Todo</h2>
        <button onclick="document.getElementById('add-todo-dialog').close()">&times;</button>
      </div>
      {% include "todo_form.html" %}
    </div>
  </dialog>

  <ul id="todo-list" class="space-y-2">
    {% for todo in todos %}
      {% include "todo_row.html" %}
    {% endfor %}
  </ul>
</div>
{% endblock %}
