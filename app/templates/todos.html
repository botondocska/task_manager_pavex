{% extends "base.html" %}
{% block title %}Todos{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 py-6 sm:py-10">
  {% include "page_nav.html" %}

  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-3xl font-semibold tracking-tight text-slate-900">Todos</h1>
      <p class="mt-1 text-sm text-slate-600">Your default workspace.</p>
    </div>
    <button onclick="document.getElementById('add-todo-dialog').showModal()"
            class="rounded-full bg-slate-900 px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-slate-700">
      Add Todo
    </button>
  </div>

  <dialog id="add-todo-dialog" class="rounded-2xl shadow-xl p-0 max-w-md w-full backdrop:bg-black/40">
    <div class="p-6 bg-white">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-slate-900">New Todo</h2>
        <button onclick="document.getElementById('add-todo-dialog').close()"
                class="text-slate-400 hover:text-slate-600">&times;</button>
      </div>
      {% include "todo_form.html" %}
    </div>
  </dialog>

  <ul id="todo-list" class="space-y-3">
    {% for todo in todos %}
      {% include "todo_row.html" %}
    {% endfor %}
  </ul>
</div>
{% endblock %}
