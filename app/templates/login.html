{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
  <form hx-post="/login" hx-target="#form-result" hx-swap="innerHTML"
        class="bg-base-100 border border-base-300 p-8 rounded-lg shadow-md w-96 space-y-4">
    <h1 class="text-2xl font-bold">Login</h1>
    <div id="form-result" class="text-sm"></div>
    <input name="email" type="email" placeholder="Email"
           class="input input-bordered w-full">
    <input name="password" type="password" placeholder="Password"
           class="input input-bordered w-full">
    <button type="submit" class="btn btn-primary w-full">
      Login
    </button>
    <p class="text-center text-sm opacity-70">
      No account? <a href="/signup" class="link link-primary">Sign up</a>
    </p>
  </form>
</div>
{% endblock %}
