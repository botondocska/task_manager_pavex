{% extends "base.html" %}
{% block content %}
<div class="w-full px-4 py-6 sm:py-10">
<nav class="mb-6 flex flex-wrap items-center gap-4 text-sm">
  {% for item in nav_items %}
    <a href="{{ item.path }}" class="{% if active_page == item.key %}font-semibold text-base-content{% else %}link link-primary no-underline hover:underline{% endif %}">{{ item.label }}</a>
  {% endfor %}
  <form method="post" action="/logout" class="ml-auto">
    <button type="submit" class="link link-error no-underline hover:underline">Logout</button>
  </form>
</nav>
{% block page_content %}{% endblock %}
</div>
{% endblock %}
