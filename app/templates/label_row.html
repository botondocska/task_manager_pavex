<li id="label-{{ label.id }}" class="flex items-center gap-3 bg-base-100 border border-base-300 rounded-lg px-3 py-2">
  <span class="w-4 h-4 rounded-full" style="background-color: {{ label.color }}"></span>
  <span class="flex-1">{{ label.name }}</span>
  <button popovertarget="edit-label-{{ label.id }}"
          class="link link-primary no-underline hover:underline text-sm">
    Edit
  </button>
  <button hx-delete="/labels/{{ label.id }}" hx-target="#label-{{ label.id }}" hx-swap="outerHTML"
          class="link link-error no-underline hover:underline text-sm">
    Delete
  </button>

  <div popover id="edit-label-{{ label.id }}"
       class="bg-base-100 border border-base-300 rounded-lg shadow-lg p-4 w-72">
    <form hx-put="/labels/{{ label.id }}" hx-target="#label-{{ label.id }}" hx-swap="outerHTML"
          class="space-y-3">
      <input name="name" type="text" value="{{ label.name }}" required
             class="input input-bordered w-full">
      <input name="color" type="color" value="{{ label.color }}"
             class="w-10 h-10 border border-base-300 rounded-full bg-base-100 p-0">
      <button type="submit" class="btn btn-primary w-full">
        Save
      </button>
    </form>
  </div>
</li>
