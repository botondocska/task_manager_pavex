<li id="label-{{ label.id }}" class="flex items-center gap-3 bg-base-100 border border-base-300 rounded-lg px-3 py-3 sm:py-2">
  <span class="w-5 h-5 sm:w-4 sm:h-4 rounded-full shrink-0" style="background-color: {{ label.color }}"></span>
  <span class="flex-1 text-base sm:text-sm">{{ label.name }}</span>
  <button popovertarget="edit-label-{{ label.id }}"
          class="link link-primary no-underline hover:underline text-base sm:text-sm py-1">
    Edit
  </button>
  <button hx-delete="/labels/{{ label.id }}" hx-target="#label-{{ label.id }}" hx-swap="outerHTML"
          class="link link-error no-underline hover:underline text-base sm:text-sm py-1">
    Delete
  </button>

  <div popover id="edit-label-{{ label.id }}"
       class="bg-base-100 border border-base-300 rounded-lg shadow-lg p-4 w-[90vw] max-w-72">
    <form hx-put="/labels/{{ label.id }}" hx-target="#label-{{ label.id }}" hx-swap="outerHTML"
          class="space-y-3">
      <input name="name" type="text" value="{{ label.name }}" required
             class="input input-bordered input-lg sm:input-md w-full">
      <input name="color" type="color" value="{{ label.color }}"
             class="w-12 h-12 sm:w-10 sm:h-10 border border-base-300 rounded-full bg-base-100 p-0">
      <button type="submit" class="btn btn-primary btn-lg sm:btn-md w-full">
        Save
      </button>
    </form>
  </div>
</li>
