<li id="label-{{ label.id }}" class="flex items-center gap-3 bg-white border border-gray-200 rounded px-3 py-2">
  <span class="w-4 h-4 rounded-full" style="background-color: {{ label.color }}"></span>
  <span class="flex-1">{{ label.name }}</span>
  <button hx-delete="/labels/{{ label.id }}" hx-target="#label-{{ label.id }}" hx-swap="outerHTML"
          class="text-red-600 hover:underline text-sm">
    Delete
  </button>
</li>
