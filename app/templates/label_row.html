<li id="label-{{ label.id }}" class="flex items-center gap-3 bg-white border border-gray-200 rounded px-3 py-2">
  <span class="w-4 h-4 rounded-full" style="background-color: {{ label.color }}"></span>
  <span class="flex-1">{{ label.name }}</span>
  <button popovertarget="edit-label-{{ label.id }}"
          class="text-blue-600 hover:underline text-sm">
    Edit
  </button>
  <button hx-delete="/labels/{{ label.id }}" hx-target="#label-{{ label.id }}" hx-swap="outerHTML"
          class="text-red-600 hover:underline text-sm">
    Delete
  </button>

  <div popover id="edit-label-{{ label.id }}"
       class="bg-white border border-gray-200 rounded-lg shadow-lg p-4 w-72">
    <form hx-put="/labels/{{ label.id }}" hx-target="#label-{{ label.id }}" hx-swap="outerHTML"
          class="space-y-3">
      <input name="name" type="text" value="{{ label.name }}" required
             class="w-full border border-gray-300 rounded px-3 py-2">
            <input name="color" type="color" value="{{ label.color }}"
              class="w-10 h-10 border border-gray-300 rounded-full bg-white p-0">
      <button type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
        Save
      </button>
    </form>
  </div>
</li>
